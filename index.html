<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Thuy Duong's Corner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <style>
    :root {
      --primary-pink: #fdf5f5;
      --accent-pink: #fae8e8;
      --deep-navy: #1a2b4b;
      --text-gray: #4a4a4a;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #ffffff;
      color: var(--text-gray);
      min-height: 100vh;
    }

    h1,
    h2,
    h3,
    .serif {
      font-family: 'Playfair Display', serif;
    }

    .hero-pattern {
      background-color: var(--primary-pink);
      background-image: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255, 255, 255, 0.5) 40px, rgba(255, 255, 255, 0.5) 80px);
    }

    .glassmorphism {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .product-card {
      transition: all 0.3s ease;
    }

    .product-card:hover {
      transform: translateY(-8px);
    }

    .category-card {
      position: relative;
      border-radius: 1.25rem;
      overflow: hidden;
      border: 2.5px solid rgba(249, 220, 220, 0.7);
      box-shadow: 0 8px 30px rgba(200, 100, 100, 0.12);
      transition: all 0.35s cubic-bezier(.25,.8,.25,1);
    }

    .category-card:hover {
      box-shadow: 0 16px 48px rgba(200, 100, 100, 0.25);
      border-color: rgba(240, 140, 140, 0.9);
      transform: translateY(-6px) scale(1.02);
    }

    .category-overlay {
      background: linear-gradient(to top, rgba(26,43,75,0.65) 0%, rgba(0,0,0,0.05) 60%);
      transition: all 0.35s ease;
    }

    .category-card:hover .category-overlay {
      background: linear-gradient(to top, rgba(26,43,75,0.82) 0%, rgba(0,0,0,0.12) 60%);
    }

    .animate-float {
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-15px);
      }

      100% {
        transform: translateY(0px);
      }
    }
    
    @keyframes slideIn {
      from { transform: translateX(-100%); }
      to { transform: translateX(0); }
    }
    .animate-slide-in {
      animation: slideIn 0.3s ease-out forwards;
    }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              pink: '#fce7e7',
              accent: '#f8bbbb',
              navy: '#1a2b4b'
            }
          }
        }
      }
    }
  </script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const productsData = [
      { id: "7", name: "Áo thun Holiday Vietnam Cotton", category: "Clothing", brand: "Holiday", price: "160.000₫", image: "https://down-vn.img.susercontent.com/file/vn-11134207-7ras8-mc5r85sq0k8i1b", link: "https://shopee.vn/product/907898485/41801825398", review: "Áo thun cotton Holiday Vietnam siêu xinh cho bé, mặc mùa hè đi biển là hết bài luôn các vợ ơi!", recommended: true },
      { id: "8", name: "Mũ cói đi biển LOULI SAIGON", category: "Accessories", brand: "Louli", price: "94.000₫", image: "https://down-vn.img.susercontent.com/file/vn-11134207-7ra0g-ma5dut5vmh1485", link: "https://shopee.vn/product/906790672/25993074453", review: "Chiếc mũ cói hở đầu siêu thời trang, vành rộng chống nắng cực tốt cho các nàng đi biển đây ạ!", recommended: true },
      { id: "9", name: "Xe đạp ba bánh chòi chân 3in1 SPORT", category: "Baby products", brand: "Sport", price: "235.000₫", image: "https://down-vn.img.susercontent.com/file/vn-11134207-7ras8-m1ad9anzk7bw50", link: "https://shopee.vn/product/126431486/7016923625", review: "Xe đa năng cho bé tập đi, cực kỳ chắc chắn và an toàn.", recommended: true },
      { id: "10", name: "Set pijama dáng dài sọc caro", category: "Clothing", brand: "SOMS", price: "185.000₫", image: "https://down-vn.img.susercontent.com/file/vn-11134207-7r98o-llt5wa1cebq79f", link: "https://shopee.vn/product/148607045/14293952481", review: "Bộ mặc nhà siêu cưng, vải thô mềm mặc mát lắm luôn.", recommended: false },
      { id: "11", name: "Quần jeans ống rộng Daughter Jeans", category: "Clothing", brand: "Daughter", price: "450.000₫", image: "https://down-vn.img.susercontent.com/file/vn-11134207-820l4-mgrg9qhgsc2359", link: "https://shopee.vn/product/70804043/27465664372", review: "Form loose fit cực tôn dáng, mặc đi làm đi chơi đều cực chất.", recommended: true },
      { id: "12", name: "Túi Tote Leacat thời trang", category: "Accessories", brand: "Leacat", price: "120.000₫", image: "https://down-vn.img.susercontent.com/file/cn-11134208-7ras8-m3zscwibaluv3b", link: "https://shopee.vn/product/163313806/28321713920", review: "Túi đựng được nhiều đồ, phong cách basic dễ phối đồ.", recommended: false },
      { id: "13", name: "Áo thun tay lỡ hàn SOMS | Loli Tee", category: "Clothing", brand: "SOMS", price: "155.000₫", image: "https://down-vn.img.susercontent.com/file/vn-11134207-81ztc-mmigvj1115ov16", link: "https://shopee.vn/product/199383221/26262776063", review: "Chất thun mịn, form rộng mặc thoải mái cực kỳ.", recommended: false },
      { id: "14", name: "Chân váy linen form lửng SOMS", category: "Clothing", brand: "SOMS", price: "210.000₫", image: "https://down-vn.img.susercontent.com/file/vn-11134207-7ras8-mc6705wkoset7b", link: "https://shopee.vn/product/199383221/28888662986", review: "Chất linen mát mẻ, form lửng nhẹ nhàng nữ tính.", recommended: false },
      { id: "15", name: "Quần kaki nữ ống suông Nan Trousers", category: "Clothing", brand: "Nan", price: "285.000₫", image: "https://down-vn.img.susercontent.com/file/vn-11134258-81ztc-mm73dsuzgkr37a", link: "https://shopee.vn/product/283162524/56403350176", review: "Quần kaki form suông basic, cực dễ mix match.", recommended: true },
      { id: "16", name: "Chân váy JEANS suông dài ÁIMEE", category: "Clothing", brand: "Áimee", price: "320.000₫", image: "https://down-vn.img.susercontent.com/file/vn-11134207-7ras8-m13oe2ei75srce", link: "https://shopee.vn/product/35007929/29413469908", review: "Chân váy denim suông dài hack dáng siêu đỉnh.", recommended: true }
    ];

    const useHashPath = () => {
      const [path, setPath] = useState(window.location.hash.replace(/^#/, '') || '/');
      useEffect(() => {
        const onHashChange = () => setPath(window.location.hash.replace(/^#/, '') || '/');
        window.addEventListener('hashchange', onHashChange);
        return () => window.removeEventListener('hashchange', onHashChange);
      }, []);
      return path;
    };

    const Link = ({ to, children, className }) => (
      <a href={`#${to}`} className={className}>{children}</a>
    );

    const trackClick = (productName) => {
      console.log('Tracking click:', productName);
      if (typeof gtag === 'function') {
        gtag('event', 'click_product', { 'product_name': productName });
      }
    };

    const Navbar = () => {
      const path = useHashPath();
      const isActive = (p) => path === p || path.startsWith(p + '/');
      const [menuOpen, setMenuOpen] = React.useState(false);

      const categories = [
        { to: '/', label: 'Home' },
        { to: '/category/Clothing', label: 'Clothing' },
        { to: '/category/Accessories', label: 'Accessories' },
        { to: '/category/Shoes', label: 'Shoes' },
        { to: '/category/Baby products', label: 'Baby Products' },
      ];

      return (
        <>
          {/* Mobile Drawer Overlay */}
          {menuOpen && (
            <div className="fixed inset-0 z-[200] flex">
              <div className="absolute inset-0 bg-black/30" onClick={() => setMenuOpen(false)}></div>
              <div className="relative w-72 max-w-[85vw] h-full bg-white shadow-2xl flex flex-col z-10 animate-slide-in">
                <div className="flex items-center justify-between px-6 py-5 border-b border-gray-100">
                  <p className="serif text-xl text-brand-navy font-bold">Thuy Duong Picks</p>
                  <button onClick={() => setMenuOpen(false)} className="text-gray-400 hover:text-brand-navy p-1">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </button>
                </div>
                <nav className="flex flex-col px-6 py-6 gap-1">
                  {categories.map(cat => (
                    <Link
                      key={cat.to}
                      to={cat.to}
                      onClick={() => setMenuOpen(false)}
                      className={`py-3 px-4 rounded-lg text-[13px] uppercase tracking-widest font-semibold transition-all ${
                        isActive(cat.to)
                          ? 'bg-brand-pink text-brand-navy border-l-4 border-pink-400'
                          : 'text-gray-500 hover:bg-brand-pink/50 hover:text-brand-navy'
                      }`}
                    >
                      {cat.label}
                    </Link>
                  ))}
                </nav>
                <div className="mt-auto px-6 py-6 border-t border-gray-100">
                  <div className="flex gap-5 justify-center">
                    <a href="https://www.facebook.com/tduong08/" target="_blank" className="hover:text-blue-500 transition-colors text-gray-400">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
                    </a>
                    <a href="https://www.instagram.com/iamjolie__/" target="_blank" className="hover:text-pink-500 transition-colors text-gray-400">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                    </a>
                    <a href="https://www.tiktok.com/@iamjolie__" target="_blank" className="hover:text-black transition-colors text-gray-400">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>
                    </a>
                  </div>
                </div>
              </div>
            </div>
          )}

          <nav className="fixed top-0 left-0 right-0 z-50 glassmorphism py-4">
            <div className="max-w-7xl mx-auto px-6 flex items-center justify-between font-medium text-[11px] uppercase tracking-widest">
              {/* Hamburger button - mobile only */}
              <button
                className="lg:hidden text-brand-navy p-1"
                onClick={() => setMenuOpen(true)}
                aria-label="Open menu"
              >
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
              </button>

              {/* Desktop links */}
              <div className="hidden lg:flex gap-8">
                {categories.map(cat => (
                  <Link key={cat.to} to={cat.to} className={`${
                    isActive(cat.to) ? 'text-brand-navy font-bold border-b border-brand-navy' : 'hover:text-pink-400 opacity-60'
                  }`}>{cat.label}</Link>
                ))}
              </div>
              <Link to="/" className="text-2xl font-bold serif tracking-tight text-center">
                THUY DUONG<br /><span className="text-[10px] tracking-[0.3em] font-light">picks</span>
              </Link>
              <div className="flex gap-6 items-center">
                <a href="https://www.facebook.com/tduong08/" target="_blank" aria-label="Facebook" className="hover:text-blue-500 transition-colors">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z" /></svg>
                </a>
                <a href="https://www.instagram.com/iamjolie__/" target="_blank" aria-label="Instagram" className="hover:text-pink-500 transition-colors">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="2" y="2" width="20" height="20" rx="5" ry="5" /><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" /><line x1="17.5" y1="6.5" x2="17.51" y2="6.5" /></svg>
                </a>
                <a href="https://www.tiktok.com/@iamjolie__" target="_blank" aria-label="TikTok" className="hover:text-black transition-colors">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5" /></svg>
                </a>
              </div>
            </div>
          </nav>
        </>
      );
    };

    const ProductCard = ({ product }) => (
      <div className="product-card group p-4 rounded-xl shadow-sm border border-brand-accent/20 hover:shadow-md transition-all" style={{backgroundColor: '#fef4f4'}}>
        <a href={product.link} target="_blank" onClick={() => trackClick(product.name)} className="block relative aspect-square mb-4 bg-brand-pink/20 rounded-lg overflow-hidden p-2 cursor-pointer">
          <img src={product.image} className="w-full h-full object-cover rounded-md group-hover:scale-110 transition-transform duration-700" />
          {product.recommended && <span className="absolute top-2 left-2 bg-white text-[8px] px-2 py-0.5 border border-gray-100 uppercase tracking-widest font-bold">Gợi ý</span>}
          <div className="absolute inset-0 bg-black opacity-0 group-hover:opacity-10 transition-opacity duration-300 rounded-md"></div>
        </a>
        <div className="text-center">
          <p className="text-[9px] text-gray-400 uppercase tracking-widest mb-1">{product.category}</p>
          <a href={product.link} target="_blank" onClick={() => trackClick(product.name)} className="text-sm font-semibold text-gray-800 mb-2 line-clamp-1 block hover:text-pink-400 transition-colors">{product.name}</a>
          <p className="text-md font-bold text-gray-900 mb-4">{product.price}</p>
          <a href={product.link} target="_blank" onClick={() => trackClick(product.name)} className="w-full inline-block border border-gray-100 py-3 text-[10px] uppercase tracking-widest hover:bg-brand-navy hover:text-white transition-all font-bold rounded-sm">
            Mua trên Shopee
          </a>
        </div>
      </div>
    );

    const Home = () => {
      const recs = productsData.filter(p => p.recommended);
      const cats = [
        { id: 'Clothing', name: 'Clothing', img: 'https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=800&q=80&v=1' },
        { id: 'Accessories', name: 'Accessories', img: 'https://images.unsplash.com/photo-1576053139778-7e32f2ae3cfd?w=800&q=80&v=2' },
        { id: 'Shoes', name: 'Shoes', img: 'https://images.unsplash.com/photo-1560343090-f0409e92791a?w=800&q=80&v=1' },
        { id: 'Baby products', name: 'Baby Care', img: 'https://images.unsplash.com/photo-1515488042361-ee00e0ddd4e4?w=800&q=80&v=1' }
      ];

      return (
        <div>
          {/* Hero */}
          <section className="hero-pattern pt-32 pb-20 px-6">
            <div className="max-w-7xl mx-auto flex flex-col lg:flex-row items-center gap-12">
              <div className="w-full lg:w-1/2">
                <p className="text-pink-500 italic serif mb-4 text-xl">Chào bạn, là Thùy Dương nè!</p>
                <h1 className="text-6xl md:text-8xl serif text-brand-navy mb-8 leading-tight">
                  Thuy Duong's<br />Corner<span className="text-4xl align-top ml-2">✦</span>
                </h1>
                <p className="text-gray-500 max-w-md mb-10 leading-relaxed text-lg">
                  Góc nhỏ mình dùng để chia sẻ những món đồ "chân ái" mà mình đang sử dụng hằng ngày.
                </p>
                <Link to="/category/Clothing" className="bg-brand-navy text-white px-12 py-4 uppercase tracking-[0.2em] text-[10px] font-bold hover:bg-opacity-90 transition-all rounded-sm shadow-xl inline-block">
                  Khám phá ngay
                </Link>
              </div>
              <div className="w-full lg:w-1/2 flex justify-center">
                <div className="w-72 h-72 md:w-96 md:h-96 bg-white rounded-full p-6 shadow-2xl animate-float overflow-hidden border-8 border-brand-pink">
                  <img src="https://drive.google.com/thumbnail?id=10EKKuAbDOfy6JMikp-xtMBzD4pt-yXrs&sz=w1000" className="w-full h-full object-cover rounded-full" />
                </div>
              </div>
            </div>
          </section>

          {/* Categories */}
          <section className="py-24 px-6 bg-brand-pink/30">
            <div className="max-w-7xl mx-auto">
              <h2 className="text-4xl serif text-brand-navy mb-16 text-center">Danh mục sản phẩm</h2>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                {cats.map(c => (
                  <Link key={c.id} to={`/category/${c.id}`} className="category-card relative aspect-square group overflow-hidden rounded-2xl shadow-sm">
                    <img src={c.img} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                    <div className="category-overlay absolute inset-0 flex items-center justify-center">
                      <span className="text-white uppercase tracking-[0.2em] text-sm font-bold border-b-2 border-white pb-2">{c.name}</span>
                    </div>
                  </Link>
                ))}
              </div>
            </div>
          </section>

          {/* All Products */}
          <section className="py-24 px-6 max-w-7xl mx-auto">
            <h2 className="text-4xl serif text-brand-navy mb-16 text-center">Mới cập nhật</h2>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-8">
              {productsData.filter(p => !p.recommended).map(p => <ProductCard key={p.id} product={p} />)}
            </div>
          </section>

          {/* All Products */}
          <section className="py-24 px-6 bg-white" style={{borderTop: '2px solid rgba(248,187,187,0.4)'}}>
            <div className="max-w-7xl mx-auto">
              <div className="flex items-center gap-4 mb-16 justify-center">
                <div className="h-px bg-gradient-to-r from-transparent via-pink-300 to-transparent flex-1 max-w-xs"></div>
                <h2 className="text-4xl serif text-brand-navy text-center whitespace-nowrap">Tất cả sản phẩm</h2>
                <div className="h-px bg-gradient-to-r from-transparent via-pink-300 to-transparent flex-1 max-w-xs"></div>
              </div>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-8">
                {recs.map(p => <ProductCard key={p.id} product={p} />)}
              </div>
            </div>
          </section>
        </div>
      );
    }

    const Category = ({ categoryId }) => {
      const items = productsData.filter(p => p.category === decodeURIComponent(categoryId));
      return (
        <div className="max-w-7xl mx-auto px-6 py-32">
          <Link to="/" className="inline-flex items-center gap-2 text-gray-400 hover:text-brand-navy mb-12 uppercase text-[10px] font-bold">← Quay lại</Link>
          <h1 className="text-5xl serif text-brand-navy mb-16">{categoryId}</h1>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-8">
            {items.map(p => <ProductCard key={p.id} product={p} />)}
          </div>
        </div>
      );
    }

    const ProductDetail = ({ id }) => {
      const p = productsData.find(x => x.id === id);
      if (!p) { window.location.hash = '/'; return null; }
      return (
        <div className="max-w-6xl mx-auto px-6 py-32">
          <Link to="/" className="inline-flex items-center gap-2 text-gray-400 mb-12 uppercase text-[10px] font-bold">← Trang chủ</Link>
          <div className="flex flex-col lg:flex-row gap-16 lg:gap-24">
            <div className="w-full lg:w-1/2">
              <div className="aspect-square bg-brand-pink/20 rounded-3xl p-6 border border-gray-50 flex items-center justify-center">
                <img src={p.image} className="w-full h-full object-cover rounded-2xl shadow-xl" />
              </div>
            </div>
            <div className="w-full lg:w-1/2">
              <p className="text-pink-500 italic serif text-lg mb-2">{p.category}</p>
              <h1 className="text-4xl md:text-5xl serif text-brand-navy mb-6 leading-tight font-bold">{p.name}</h1>
              <div className="text-3xl font-bold text-gray-900 mb-8 pb-8 border-b border-gray-50">{p.price}</div>
              <div className="bg-brand-pink/10 border border-brand-accent/50 rounded-2xl p-8 mb-10">
                <h3 className="text-[10px] uppercase tracking-widest font-bold text-brand-navy mb-4">Review từ Thùy Dương</h3>
                <p className="text-gray-600 italic leading-loose">"{p.review}"</p>
              </div>

              </div>
              <div>
                <h4 className="font-bold text-[10px] uppercase tracking-widest mb-8">Danh mục</h4>
                <ul className="text-[12px] text-gray-500 space-y-4 font-medium uppercase tracking-tighter">
                  <li><Link to="/category/Clothing">Quần áo</Link></li>
                  <li><Link to="/category/Accessories">Phụ kiện</Link></li>

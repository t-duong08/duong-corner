name: Sync Products from Google Sheets

on:
  schedule:
    - cron: '0 */6 * * *' # Chạy mỗi 6 tiếng
  workflow_dispatch: # Cho phép chạy thủ công

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run sync script
        run: node sync.js

      - name: Commit and Push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add index.html preview.html src/data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-sync products from Google Sheets" && git push)

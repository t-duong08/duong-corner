    }

    .glassmorphism {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .product-card {
      transition: all 0.3s ease;
    }

    .product-card:hover {

    }

    .category-card {
      position: relative;
      border-radius: 1.25rem;
      overflow: hidden;

    }

    .category-card:hover {

      border-color: rgba(240, 140, 140, 0.9);
      transform: translateY(-6px) scale(1.02);
    }

    .category-overlay {
      background: linear-gradient(to top, rgba(26,43,75,0.65) 0%, rgba(0,0,0,0.05) 60%);
      transition: all 0.35s ease;
    }

    .category-card:hover .category-overlay {
      background: linear-gradient(to top, rgba(26,43,75,0.82) 0%, rgba(0,0,0,0.12) 60%);
    }

    .animate-float {
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-15px);
      }

      100% {
        transform: translateY(0px);
      }
    }
    
    @keyframes slideIn {
      from { transform: translateX(-100%); }
      to { transform: translateX(0); }
    }
    .animate-slide-in {
      animation: slideIn 0.3s ease-out forwards;
    }

    const useHashPath = () => {
      const [path, setPath] = useState(window.location.hash.replace(/^#/, '') || '/');
      useEffect(() => {
        const onHashChange = () => setPath(window.location.hash.replace(/^#/, '') || '/');
        window.addEventListener('hashchange', onHashChange);
        return () => window.removeEventListener('hashchange', onHashChange);
      }, []);
      return path;
    };

    const Link = ({ to, children, className }) => (
      <a href={`#${to}`} className={className}>{children}</a>
    );

    const trackClick = (productName) => {
